version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: rvc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  matching-service:
    build:
      context: ./matching-service
    container_name: rvc-matching
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  signalling-service:
    build:
      context: ./signalling-service
    container_name: rvc-signalling
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
